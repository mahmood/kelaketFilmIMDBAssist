name: Daily IMDb Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scrapers
        run: |
          node movies.js
          node series.js

      # --- Debug: ببین فایل‌ها واقعاً ساخته شده‌اند یا نه
      - name: Debug - list generated files
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "---- top250movies.json ----"
          (test -f top250movies.json && wc -c top250movies.json && head -n 5 top250movies.json) || echo "top250movies.json NOT FOUND"
          echo "---- top250series.json ----"
          (test -f top250series.json && wc -c top250series.json && head -n 5 top250series.json) || echo "top250series.json NOT FOUND"

      # --- Debug: وضعیت git قبل از commit
      - name: Debug - git status
        run: |
          git status --porcelain=v1
          git diff --name-only

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: auto-update IMDb data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
