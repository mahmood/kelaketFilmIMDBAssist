name: Daily IMDb Update

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: imdb-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run scrapers
        run: |
          set -euo pipefail
          node movies.js
          node series.js
          node boxoffice.js
          node upcoming.js

      - name: Collect run stats
        id: stats
        run: |
          set -euo pipefail

          MOVIES_FILE="top250movies.json"
          SERIES_FILE="top250series.json"
          BOXOFFICE_FILE="boxoffice.json"
          UPCOMING_FILE="upcoming.json"

          [ -f "$MOVIES_FILE" ] || { echo "Movies file not found: $MOVIES_FILE" >&2; exit 1; }
          [ -f "$SERIES_FILE" ] || { echo "Series file not found: $SERIES_FILE" >&2; exit 1; }
          [ -f "$BOXOFFICE_FILE" ] || { echo "BoxOffice file not found: $BOXOFFICE_FILE" >&2; exit 1; }
          [ -f "$UPCOMING_FILE" ] || { echo "Upcoming file not found: $UPCOMING_FILE" >&2; exit 1; }

          MOVIES_BYTES="$(wc -c < "$MOVIES_FILE" | tr -d ' ')"
          SERIES_BYTES="$(wc -c < "$SERIES_FILE" | tr -d ' ')"
          BOXOFFICE_BYTES="$(wc -c < "$BOXOFFICE_FILE" | tr -d ' ')"
          UPCOMING_BYTES="$(wc -c < "$UPCOMING_FILE" | tr -d ' ')"

          MOVIES_COUNT="$(node -e "const a=require('./top250movies.json'); console.log(Array.isArray(a)?a.length:0)")"
          SERIES_COUNT="$(node -e "const a=require('./top250series.json'); console.log(Array.isArray(a)?a.length:0)")"
          BOXOFFICE_COUNT="$(node -e "const a=require('./boxoffice.json'); console.log(Array.isArray(a)?a.length:0)")"
          UPCOMING_COUNT="$(node -e "const a=require('./upcoming.json'); console.log(Array.isArray(a)?a.length:0)")"

          UPCOMING_MOVIES_COUNT="$(node -e "const a=require('./upcoming.json'); console.log(Array.isArray(a)?a.filter(x=>x && x.type==='movie').length:0)")"
          UPCOMING_SERIES_COUNT="$(node -e "const a=require('./upcoming.json'); console.log(Array.isArray(a)?a.filter(x=>x && x.type==='series').length:0)")"

          MOVIES_TOP="$(node -e "const a=require('./top250movies.json'); const x=a && a[0]; console.log(x ? ((x.title||x.name||'N/A') + ' (' + (x.year||'') + ')') : 'N/A')")"
          SERIES_TOP="$(node -e "const a=require('./top250series.json'); const x=a && a[0]; console.log(x ? ((x.title||x.name||'N/A') + ' (' + (x.year||'') + ')') : 'N/A')")"

          {
            echo "movies_bytes=${MOVIES_BYTES}"
            echo "series_bytes=${SERIES_BYTES}"
            echo "boxoffice_bytes=${BOXOFFICE_BYTES}"
            echo "upcoming_bytes=${UPCOMING_BYTES}"
            echo "movies_count=${MOVIES_COUNT}"
            echo "series_count=${SERIES_COUNT}"
            echo "boxoffice_count=${BOXOFFICE_COUNT}"
            echo "upcoming_count=${UPCOMING_COUNT}"
            echo "upcoming_movies_count=${UPCOMING_MOVIES_COUNT}"
            echo "upcoming_series_count=${UPCOMING_SERIES_COUNT}"
            echo "movies_top=${MOVIES_TOP}"
            echo "series_top=${SERIES_TOP}"
          } >> "$GITHUB_OUTPUT"

      - name: Commit & Push (if changed)
        id: commit
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add top250movies.json top250series.json boxoffice.json upcoming.json

          if git diff --staged --quiet; then
            echo "No changes."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: auto-update IMDb data ($(date -u +'%Y-%m-%d %H:%M UTC'))"

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Telegram (Success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          SHA: ${{ github.sha }}
          MOVIES_COUNT: ${{ steps.stats.outputs.movies_count }}
          SERIES_COUNT: ${{ steps.stats.outputs.series_count }}
          BOXOFFICE_COUNT: ${{ steps.stats.outputs.boxoffice_count }}
          UPCOMING_COUNT: ${{ steps.stats.outputs.upcoming_count }}
          UPCOMING_MOVIES_COUNT: ${{ steps.stats.outputs.upcoming_movies_count }}
          UPCOMING_SERIES_COUNT: ${{ steps.stats.outputs.upcoming_series_count }}
          MOVIES_BYTES: ${{ steps.stats.outputs.movies_bytes }}
          SERIES_BYTES: ${{ steps.stats.outputs.series_bytes }}
          BOXOFFICE_BYTES: ${{ steps.stats.outputs.boxoffice_bytes }}
          UPCOMING_BYTES: ${{ steps.stats.outputs.upcoming_bytes }}
          MOVIES_TOP: ${{ steps.stats.outputs.movies_top }}
          SERIES_TOP: ${{ steps.stats.outputs.series_top }}
        run: |
          set -euo pipefail

          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"
          NOW="$(date -u +'%Y-%m-%d %H:%M UTC')"

          MSG="$(printf '%s\n\n%s\n%s\n%s\n%s\n\n%s\n%s\n%s\n%s\n%s\n\n%s\n%s\n\n%s\n%s\n%s\n' \
            '🎬✅ IMDb Update: SUCCESS' \
            "🕒 Time (UTC): ${NOW}" \
            "📦 Repo: ${REPO}" \
            "🌿 Branch: ${BRANCH}" \
            "👤 Actor: ${ACTOR} | Event: ${EVENT_NAME}" \
            "🎞️ Movies Top250: ${MOVIES_COUNT} items | ${MOVIES_BYTES} bytes" \
            "📺 Series Top250: ${SERIES_COUNT} items | ${SERIES_BYTES} bytes" \
            "💰 Box Office: ${BOXOFFICE_COUNT} items | ${BOXOFFICE_BYTES} bytes" \
            "🗓️ Upcoming: ${UPCOMING_COUNT} items | ${UPCOMING_BYTES} bytes" \
            "   Movies: ${UPCOMING_MOVIES_COUNT} | Series: ${UPCOMING_SERIES_COUNT}" \
            "🏆 #1 Movie: ${MOVIES_TOP}" \
            "🏆 #1 Series: ${SERIES_TOP}" \
            "📝 Commit pushed: ${COMMITTED}" \
            "🔗 Run: ${RUN_URL}" \
            "🔎 Commit: ${COMMIT_URL}")"

          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$MSG" \
            -d disable_web_page_preview=true

      - name: Telegram (Failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"
          NOW="$(date -u +'%Y-%m-%d %H:%M UTC')"

          MSG="$(printf '%s\n\n%s\n%s\n%s\n%s\n\n%s\n%s\n' \
            '🎬❌ IMDb Update: FAILED' \
            "🕒 Time (UTC): ${NOW}" \
            "📦 Repo: ${REPO}" \
            "🌿 Branch: ${BRANCH}" \
            "👤 Actor: ${ACTOR} | Event: ${EVENT_NAME}" \
            "🔗 Logs: ${RUN_URL}" \
            "🔎 Commit: ${COMMIT_URL}")"

          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$MSG" \
            -d disable_web_page_preview=true
