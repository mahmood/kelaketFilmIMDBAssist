name: Daily IMDb Update

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: imdb-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run scrapers
        run: |
          node movies.js
          node series.js

      - name: Commit & Push (if changed)
        id: commit
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # فقط فایل‌هایی که انتظار داری آپدیت شوند
          git add top250movies.json top250series.json

          if git diff --staged --quiet; then
            echo "No changes."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: auto-update IMDb data ($(date -u +'%Y-%m-%d %H:%M UTC'))"

          # جلوگیری از push rejected در صورت تغییرات همزمان
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Telegram (Success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          NOW="$(date -u +'%Y-%m-%d %H:%M UTC')"

          MSG="$(printf '%s\n%s\n%s\n%s\n%s\n' \
            "IMDb Update: SUCCESS" \
            "Repo: ${REPO}" \
            "Branch: ${BRANCH}" \
            "Committed: ${COMMITTED}" \
            "Run: ${RUN_URL}")"

          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$MSG" \
            -d disable_web_page_preview=true

      - name: Telegram (Failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          NOW="$(date -u +'%Y-%m-%d %H:%M UTC')"

          MSG="$(printf '%s\n%s\n%s\n%s\n' \
            "IMDb Update: FAILED" \
            "Repo: ${REPO}" \
            "Branch: ${BRANCH}" \
            "Run: ${RUN_URL}")"

          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$MSG" \
            -d disable_web_page_preview=true
