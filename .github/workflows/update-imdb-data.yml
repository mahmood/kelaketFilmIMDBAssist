name: Daily IMDb Update Action

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scrapers
        run: |
          node movies.js
          node series.js

      - name: Debug - list generated files
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "---- top250movies.json ----"
          (test -f top250movies.json && wc -c top250movies.json && head -n 5 top250movies.json) || echo "top250movies.json NOT FOUND"
          echo "---- top250series.json ----"
          (test -f top250series.json && wc -c top250series.json && head -n 5 top250series.json) || echo "top250series.json NOT FOUND"

      - name: Debug - git status
        run: |
          git status --porcelain=v1
          git diff --name-only

      - name: Commit and Push if Changed
        id: commit_step
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add top250movies.json top250series.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-update IMDb data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git pull --rebase origin main
            git push origin main
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

       - name: Telegram - Success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: '${{ secrets.TELEGRAM_BOT_TOKEN }}'
          TELEGRAM_CHAT_ID: '${{ secrets.TELEGRAM_CHAT_ID }}'
          COMMITTED: '${{ steps.commit_step.outputs.committed }}'
          REPO: '${{ github.repository }}'
          BRANCH: '${{ github.ref_name }}'
          RUN_ID: '${{ github.run_id }}'
        run: |
          set -e
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          NOW="$(date -u +'%Y-%m-%d %H:%M UTC')"

          MSG="$(printf '%s\n\n%s\n%s\n%s\n%s\n%s\n' \
            "IMDb Update SUCCESS" \
            "Repo: ${REPO}" \
            "Branch: ${BRANCH}" \
            "Time: ${NOW}" \
            "Commit pushed: ${COMMITTED}" \
            "Run: ${RUN_URL}")"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$MSG" \
            -d disable_web_page_preview=true

      - name: Telegram - Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: '${{ secrets.TELEGRAM_BOT_TOKEN }}'
          TELEGRAM_CHAT_ID: '${{ secrets.TELEGRAM_CHAT_ID }}'
          REPO: '${{ github.repository }}'
          BRANCH: '${{ github.ref_name }}'
          RUN_ID: '${{ github.run_id }}'
        run: |
          set -e
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          NOW="$(date -u +'%Y-%m-%d %H:%M UTC')"

          MSG="$(printf '%s\n\n%s\n%s\n%s\n%s\n' \
            "IMDb Update FAILED" \
            "Repo: ${REPO}" \
            "Branch: ${BRANCH}" \
            "Time: ${NOW}" \
            "Logs: ${RUN_URL}")"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$MSG" \
            -d disable_web_page_preview=true
